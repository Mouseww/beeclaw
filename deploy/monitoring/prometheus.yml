# ============================================================================
# BeeClaw — Prometheus 配置
#
# 与 docker-compose.monitoring.yml 配合使用
# 抓取 beeclaw-server:3000/metrics/prometheus 端点
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── 告警规则 ─────────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alerting_rules.yml"

scrape_configs:
  # ── BeeClaw Server ──────────────────────────────────────────────────────────
  - job_name: "beeclaw"
    metrics_path: "/metrics/prometheus"
    static_configs:
      - targets: ["beeclaw-server:3000"]
        labels:
          instance: "beeclaw-primary"
          environment: "production"
    # 自定义 text format 解析（BeeClaw 输出标准 Prometheus text exposition）
    honor_labels: true
