# ============================================================================
# BeeClaw — Redis StatefulSet
# 生产环境推荐使用 Redis Sentinel 或托管 Redis (ElastiCache/MemoryStore)
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: beeclaw-redis
  namespace: beeclaw
  labels:
    app.kubernetes.io/name: beeclaw
    app.kubernetes.io/component: redis
spec:
  serviceName: beeclaw-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beeclaw
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beeclaw
        app.kubernetes.io/component: redis
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - "60"
            - "1000"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "640Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: beeclaw-redis
  namespace: beeclaw
  labels:
    app.kubernetes.io/name: beeclaw
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: beeclaw
    app.kubernetes.io/component: redis
