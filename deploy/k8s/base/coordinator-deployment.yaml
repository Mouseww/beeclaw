# ============================================================================
# BeeClaw — Coordinator Deployment (Server + TickCoordinator)
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beeclaw-coordinator
  namespace: beeclaw
  labels:
    app.kubernetes.io/name: beeclaw
    app.kubernetes.io/component: coordinator
spec:
  replicas: 1   # Coordinator 必须单副本（持有分布式锁）
  strategy:
    type: Recreate   # 避免双 Coordinator 脑裂
  selector:
    matchLabels:
      app.kubernetes.io/name: beeclaw
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beeclaw
        app.kubernetes.io/component: coordinator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics/prometheus"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: coordinator
          image: beeclaw:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: beeclaw-config
            - secretRef:
                name: beeclaw-secrets
          env:
            - name: BEECLAW_NODE_ROLE
              value: "coordinator"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # 最多 60s 启动时间
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
