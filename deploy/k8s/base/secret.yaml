# ============================================================================
# BeeClaw — Secrets (base 模板)
#
# 重要：此文件仅为模板，真实值请通过 sealed-secrets、external-secrets
# 或 CI/CD pipeline 注入，不要把明文 secret 提交到 Git。
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: beeclaw-secrets
  namespace: beeclaw
  labels:
    app.kubernetes.io/name: beeclaw
type: Opaque
stringData:
  # PostgreSQL
  DATABASE_URL: "postgresql://beeclaw:CHANGE_ME@beeclaw-postgres:5432/beeclaw"
  POSTGRES_USER: "beeclaw"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "beeclaw"
  # Redis
  BEECLAW_REDIS_URL: "redis://beeclaw-redis:6379"
  # LLM
  BEECLAW_LLM_BASE_URL: "http://localhost:11434"
  BEECLAW_LLM_API_KEY: "no-key"
  # API Auth
  BEECLAW_API_KEY: ""
