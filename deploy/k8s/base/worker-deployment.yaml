# ============================================================================
# BeeClaw — Worker Deployment
# 可水平扩展，通过 HPA 或手动调整 replicas
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beeclaw-worker
  namespace: beeclaw
  labels:
    app.kubernetes.io/name: beeclaw
    app.kubernetes.io/component: worker
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beeclaw
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beeclaw
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics/prometheus"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: beeclaw:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "packages/coordinator/dist/worker-entry.js"]
          ports:
            - name: health
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: beeclaw-config
            - secretRef:
                name: beeclaw-secrets
          env:
            - name: BEECLAW_NODE_ROLE
              value: "worker"
            - name: BEECLAW_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz/live
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
