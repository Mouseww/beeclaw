# ============================================================================
# BeeClaw — Nginx 反向代理配置
#
# 安装:
#   cp deploy/nginx/beeclaw.conf /etc/nginx/sites-available/beeclaw
#   ln -s /etc/nginx/sites-available/beeclaw /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# TLS 证书:
#   certbot --nginx -d beeclaw.example.com
# ============================================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name beeclaw.example.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name beeclaw.example.com;

    # ── TLS 证书 ────────────────────────────────────────────────────────
    # Let's Encrypt 自动管理 (certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/beeclaw.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beeclaw.example.com/privkey.pem;

    # ── TLS 安全参数 ────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # SSL Session 缓存
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── 安全响应头 ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 日志 ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/beeclaw-access.log;
    error_log  /var/log/nginx/beeclaw-error.log;

    # ── 通用代理头 ──────────────────────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API / Dashboard ─────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;

        # 请求大小限制（事件注入可能含长文本）
        client_max_body_size 2m;
    }

    # ── WebSocket ────────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;     # 24 小时，防止长连接被断开
        proxy_send_timeout 86400;
    }

    # ── Prometheus 指标（限内网访问）────────────────────────────────────
    location /metrics/prometheus {
        # 仅允许内网 IP 访问
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://127.0.0.1:3000/metrics/prometheus;
    }
}
